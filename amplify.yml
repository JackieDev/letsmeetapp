version: 1
frontend:
  phases:
    preBuild:
      commands:
        - apt-get update && apt-get install -y jq
        - echo HELLO!!!!!
        - echo ($secrets | jq -r '.MY_SECRET')
        - echo "CLERK_SECRET_KEY=$(echo $secrets | jq -r '.CLERK_SECRET_KEY')" >> .env.production
        - echo "DATABASE_URL=$(echo $secrets | jq -r '.DATABASE_URL')" >> .env.production
        - echo "RESEND_API_KEY=$(echo $secrets | jq -r '.RESEND_API_KEY')" >> .env.production   
        - echo "NEXT_PUBLIC_CLERK_BILLING_PLAN_ID=$(echo $secrets | jq -r '.NEXT_PUBLIC_CLERK_BILLING_PLAN_ID')" >> .env.production
        - echo "CLERK_WEBHOOK_SIGNING_SECRET=$(echo $secrets | jq -r '.CLERK_WEBHOOK_SIGNING_SECRET')" >> .env.production
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
