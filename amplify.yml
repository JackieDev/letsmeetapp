version: 1
backend:
  phases:
    build:
      commands:
        - echo "Now running the build phase for the backend"
        - npm install -g @aws-amplify/cli
        - echo "# install jq"
        - sudo yum install jq -y
frontend:
  phases:
    preBuild:
      commands:
        - echo "Now running the preBuild phase for the frontend"
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - echo "Now running the build phase for the frontend"
        - node scripts/write-production-env.js
        - node scripts/ensure-production-schema.js
        - npm run build
        - |
          if [ -f .env.production ] && [ -d .next/standalone ]; then
            cp .env.production .next/standalone/.env.production
            echo "Copied .env.production into standalone output"
          else
            echo "Warning: .env.production or .next/standalone missing; runtime env may be incomplete"
          fi
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
