version: 1
backend:
  phases:
    build:
      commands:
        - echo "Now running the build phase for the backend"
        - npm install -g @aws-amplify/cli
        - echo "# install jq"
        - sudo yum install jq -y
frontend:
  phases:
    preBuild:
      commands:
        - echo "Now running the preBuild phase for the frontend"
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - echo "Now running the build phase for the frontend"
        - echo "MY_SECRET=$(echo $secrets | jq -r '.MY_SECRET')"
        - echo "CLERK_SECRET_KEY=$(echo $secrets | jq -r '.CLERK_SECRET_KEY')" >> .env.production
        - echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$(echo $secrets | jq -r '.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY')" >> .env.production
        - echo "DATABASE_URL=$(echo $secrets | jq -r '.DATABASE_URL')" >> .env.production
        - echo "RESEND_API_KEY=$(echo $secrets | jq -r '.RESEND_API_KEY')" >> .env.production   
        - echo "NEXT_PUBLIC_CLERK_BILLING_PLAN_ID=$(echo $secrets | jq -r '.NEXT_PUBLIC_CLERK_BILLING_PLAN_ID')" >> .env.production
        - echo "NEXT_PUBLIC_CLERK_BILLING_PLAN_SLUG=$(echo $secrets | jq -r '.NEXT_PUBLIC_CLERK_BILLING_PLAN_SLUG')" >> .env.production
        - echo "NEXT_PUBLIC_CLERK_BILLING_PLAN_PERIOD=annual" >> .env.production
        - echo "CLERK_WEBHOOK_SIGNING_SECRET=$(echo $secrets | jq -r '.CLERK_WEBHOOK_SIGNING_SECRET')" >> .env.production
        - echo "NEXT_PUBLIC_APP_URL=https://letsmeet.uk" >> .env.production
        - echo "NEXT_PUBLIC_CLERK_SIGN_IN_URL=/" >> .env.production
        - echo "NEXT_PUBLIC_CLERK_SIGN_UP_URL=/signed-up" >> .env.production
        - echo "NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL=/billing" >> .env.production
        - echo "NEXT_PUBLIC_CLERK_SIGN_UP_FORCE_REDIRECT_URL=/signed-up" >> .env.production
        - echo "NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/billing" >> .env.production
        - echo "NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/signed-up" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
