<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <title>Offline — LetsMeet</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        padding: 2rem;
        text-align: center;
        background: #09090b;
        color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      img {
        width: 96px;
        height: 96px;
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 600;
      }
      p {
        margin: 0;
        max-width: 28rem;
        color: #a1a1aa;
        line-height: 1.5;
      }
      button {
        margin-top: 0.5rem;
        padding: 0.65rem 1.4rem;
        font-size: 1rem;
        font-weight: 600;
        color: #09090b;
        background: #39ff14;
        border: none;
        border-radius: 0.625rem;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <img src="/icon.svg" alt="LetsMeet" />
    <h1>You&rsquo;re offline</h1>
    <p>
      LetsMeet needs an internet connection to load this page. Check your
      connection and try again.
    </p>
    <button type="button" onclick="window.location.reload()">Retry</button>
  </body>
</html>
